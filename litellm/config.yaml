model_list:
  - model_name: claude-critical
    litellm_params:
      model: anthropic/claude-sonnet-4-6
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: opencode-default
    litellm_params:
      model: openai/gpt-4o
      api_base: https://api.opencode.ai/v1
      api_key: os.environ/OPENCODE_API_KEY

  - model_name: kimi-default
    litellm_params:
      model: openai/kimi-latest
      api_base: os.environ/KIMI_API_BASE
      api_key: os.environ/KIMI_API_KEY

  - model_name: glm-default
    litellm_params:
      model: openai/glm-latest
      api_base: os.environ/GLM_API_BASE
      api_key: os.environ/GLM_API_KEY

router_settings:
  routing_strategy: usage-based-routing
  num_retries: 3

litellm_settings:
  success_callback: ["langfuse"]
  failure_callback: ["langfuse"]
  langfuse_secret: os.environ/LANGFUSE_SECRET_KEY
  langfuse_public_key: os.environ/LANGFUSE_PUBLIC_KEY
  langfuse_host: os.environ/LANGFUSE_HOST
  drop_params: true

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
